# pytest configuration (library-standalone test suite)
#
# Usage:
#   quick run:      pytest tests -v
#   with coverage:  pytest tests --cov=src/baldur --cov-report=term-missing

[pytest]
testpaths = tests
pythonpath = .
DJANGO_SETTINGS_MODULE = tests.testapp.settings
python_files = test_*.py *_test.py
python_functions = test_*
python_classes = Test* *Tests

# Default options: fast run without coverage
# For coverage: pytest --cov=src/baldur --cov-report=term-missing
# Verbose output: pytest -v
# -p no:celery: prevents the pytest-celery plugin from hanging at session
#   teardown while trying to reach a Redis broker
#   (unnecessary for pure unit tests)
addopts =
    --tb=short
    --timeout=120
    --dist=loadfile
    -p no:celery
    -m "not slow and not dormant and not requires_monorepo and not broken and not flaky_quarantine"
log_level = WARNING
log_cli = false

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    # Test-only suppression (CLAUDE.md § Skill Test Execution Rule):
    # these warnings are intentional in production code paths and
    # should remain visible at runtime — they are silenced only during
    # the unit test suite where they are non-actionable noise.
    ignore:.*exemption_reason for domain.*:UserWarning
    ignore:.*Watchdog loop may fall behind.*:UserWarning
    # Third-party: fastapi's testclient shim imports starlette.testclient,
    # whose bundled-httpx transport is deprecated upstream (UserWarning
    # subclass, so the DeprecationWarning ignore above does not catch it).
    # Actionable only via the httpx2 dependency migration at a future
    # dependency pass.
    ignore:Using `httpx` with `starlette.testclient` is deprecated:UserWarning

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    tier1: fundamental functionality tests
    tier2: integration tests
    tier3_chaos: chaos engineering tests
    integration: integration tests requiring external services
    requires_redis: tests requiring a running Redis instance
    requires_redis_sentinel: tests requiring a running Redis Sentinel topology (master+replica+3 sentinels)
    requires_db: tests requiring a running PostgreSQL instance
    requires_kafka: tests requiring a running Kafka broker
    requires_celery: tests requiring a running Celery worker
    requires_otel: tests requiring OTEL Collector and Grafana stack (Tempo, Mimir, Loki)
    django_db: tests requiring Django database access
    requires_ml: tests requiring ML libraries (scikit-learn, xgboost, statsmodels)
    requires_pro: tests requiring baldur_pro package installed (OSS+PRO boundary, doc 528 D5)
    governance: tests that explicitly test governance behavior (opt out of auto-bypass)
    recovery_gate_live: tests exercising the real RecoveryGate live-metrics checker (opt out of the _recovery_gate_metrics_bypass fixture)
    dormant: Dormant-tier feature tests (FEATURE_CATALOG §Dormant, run nightly)
    requires_monorepo: tests needing sibling packages (load_tests, shopping) — library-only suite excludes
    broken: tests with API drift awaiting fix — requires `ref:` comment (see tests/conftest.py hook)
    flaky_quarantine: tests quarantined as flaky — requires issue + first_seen kwargs (see tests/conftest.py hook)
