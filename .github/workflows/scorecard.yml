name: Scorecard

# OpenSSF Scorecard (security gate §4.3 automation) — auto-scores branch protection
# (#4), CodeQL presence (#5), Actions SHA-pin (#6), token-permission hygiene, and
# dependency-update posture, turning the manual §4.3 gate into a CI regression
# guard. Scorecard only meaningfully scores a PUBLIC repo, so like ci-oss-mirror.yml
# this ships as workflow_dispatch in the private monorepo (Route B). publish_mirror.sh
# step 1b rewrites the trigger to branch_protection_rule + a weekly schedule + push
# to main when projecting to the PUBLIC mirror.
on:
  branch_protection_rule:
  schedule:
    - cron: "27 4 * * 1"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
      - name: Upload to code-scanning dashboard
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          sarif_file: results.sarif
