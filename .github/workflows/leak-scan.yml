# Leak-scan backstop. Re-runs scripts/check_leak_guard.py on push/PR so a local
# `git commit --no-verify` (which skips the pre-commit leak guard) only defers
# the failure to CI and cannot land a private reference on the public branch.
#
# The scan self-disables in the private monorepo (the private packages exist on
# disk there), so this job is a fast green no-op in the monorepo and does real
# work only in the public-first repository.
name: leak-scan

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  leak-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Scan tracked content for private references
        run: python scripts/check_leak_guard.py --all

      - name: Scan commit messages in this push/PR for private references
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
          else
            before="${{ github.event.before }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              range=""
            else
              range="$before..${{ github.sha }}"
            fi
          fi
          if ! { [ -n "$range" ] && git log --format='%B' "$range" > messages.txt 2>/dev/null; }; then
            # Range unavailable — first push, or a force-push of unrelated history
            # (the squashed OSS baseline replaces the prior baseline, so the old
            # tip is not an ancestor of the new one and the range is invalid).
            # Scan just the tip commit message in that case.
            git log --format='%B' -1 "${{ github.sha }}" > messages.txt
          fi
          python scripts/check_leak_guard.py --commit-msg messages.txt
