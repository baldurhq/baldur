name: CodeQL

# Deep SAST — complements the bandit / pip-audit scans in security.yml. CodeQL is
# free for PUBLIC repos only, so like ci-oss-mirror.yml this ships as
# workflow_dispatch in the private monorepo (Route B: it must NEVER auto-run on the
# private repo's billed Actions / a repo without Advanced Security).
# publish_mirror.sh step 1b rewrites the trigger to push + pull_request + a weekly
# schedule when projecting to the PUBLIC mirror, where Actions are free and CodeQL
# applies.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          languages: python
          build-mode: none
          # Scan the shipped library only. Test code (tests/) deliberately
          # constructs adversarial inputs and asserts on raw outputs, so CodeQL
          # findings there are fixtures/assertions, not product vulnerabilities;
          # examples/ are demo apps. Restricting extraction to src/ keeps the
          # alert set scoped to the actual library surface.
          config: |
            paths:
              - src
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          category: "/language:python"
