name: Build OSS (baldur)

on:
  push:
    tags:
      - "v*"

# Minimal default token scope; each job escalates to the write/id-token scope
# it needs (build -> contents: write for the release, publish-pypi -> id-token).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install build
      - run: python -m build
      # 599 D13 publish-time artifact guard — the tag-triggered publish path
      # runs no tests, so a tag cut from a red commit or a pyproject
      # build-config drift would otherwise publish private-tier code silently.
      # Blocking: verifies every artifact in dist/ (wheel + sdist).
      - name: Verify OSS artifacts contain no private-tier code
        run: python scripts/verify_oss_wheel.py dist
      # Third-party license inventory: resolve the [all] dependency closure from
      # installed metadata and render THIRD_PARTY_LICENSES.md, shipped as a
      # release asset alongside the wheel + sdist (attribution obligation).
      - name: Generate third-party license notice
        run: |
          pip install -e ".[all]"
          python scripts/generate_notices.py
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3
        with:
          files: |
            dist/*
            THIRD_PARTY_LICENSES.md

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      # 599 D13 — same blocking guard as the build job: this job rebuilds its
      # own dist/, so it must re-verify the exact artifact set it publishes.
      - name: Verify OSS artifacts contain no private-tier code
        run: python scripts/verify_oss_wheel.py dist
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # release/v1
