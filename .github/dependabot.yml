version: 2
updates:
  # Python runtime + dev dependencies declared in pyproject.toml
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns:
          - "*"

  # Pinned GitHub Actions in .github/workflows/*
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  # Base images in the example Dockerfiles (pinned to digest)
  - package-ecosystem: "docker"
    directories:
      - "/examples/docker"
      - "/examples/docker/demo_app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      docker-images:
        patterns:
          - "*"
